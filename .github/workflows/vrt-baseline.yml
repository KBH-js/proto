# Regenerates the VRT screenshot baselines on the CI renderer (ubuntu) and
# commits them to the branch the workflow was dispatched on. This is the ONLY
# supported way to update baselines — locally rendered (Windows/macOS)
# screenshots differ in font rasterization/anti-aliasing and must not be
# committed. See TESTING.md § Visual regression.
name: VRT baseline

on:
  workflow_dispatch:
  # TEMP bootstrap — a workflow_dispatch workflow is only dispatchable once it
  # exists on the default branch, so until PR #24 merges, also run on pushes
  # to its branch. Remove this trigger after the baselines are refreshed.
  push:
    branches: [claude/practical-mayer-190d3b]

permissions:
  contents: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:vrt:update
      - name: Upload rendered baselines for inspection
        uses: actions/upload-artifact@v4
        with:
          name: vrt-baselines
          path: e2e/vrt/__screenshots__/
          retention-days: 7
      - name: Commit refreshed baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/vrt/__screenshots__
          if git diff --cached --quiet; then
            echo "Baselines unchanged — nothing to commit."
          else
            git commit -m "chore(vrt): refresh CI-rendered screenshot baselines"
            git push
          fi
