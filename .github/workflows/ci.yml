name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # pnpm must be installed before setup-node resolves its `cache: pnpm`;
      # the pnpm version comes from the root package.json "packageManager".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      # Host build (tsc -b && rsbuild build)
      - run: pnpm build
      # Remote builds; packages/shared has no build script and is skipped.
      # No env needed — ASSET_PREFIX defaults to 'auto'.
      - run: pnpm -r build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Visual regression — compares against CI-rendered baselines committed under
  # e2e/vrt/__screenshots__/. Skips (with a notice) until the "VRT baseline"
  # workflow has generated them. VRT runs on CI only: baselines are rendered
  # on ubuntu, and font/AA rendering differs on local Windows/macOS.
  vrt:
    name: Visual regression (VRT)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for committed baselines
        id: baselines
        run: |
          if ls e2e/vrt/__screenshots__/**/*.png >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No VRT baselines committed yet — run the 'VRT baseline' workflow to generate them."
          fi
      - if: steps.baselines.outputs.present == 'true'
        run: pnpm exec playwright install --with-deps chromium
      - if: steps.baselines.outputs.present == 'true'
        run: pnpm test:vrt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: vrt-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
